services:
  web:
    build: .
    container_name: django_app
    volumes:
      - .:/app
    expose:
      - "8000"

  caddy:
    image: caddy:latest
    container_name: caddy_server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - web

volumes:
  caddy_data:
